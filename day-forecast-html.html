<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5b6af0">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<title>Day Forecast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--bg:#f5f5f7;--surface:#fff;--s2:#f0f0f5;--accent:#5b6af0;--text:#1a1d2e;--muted:#8e8e93;--border:#e5e5ea;--green:#34c759;--red:#ff3b30;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--safe-left:env(safe-area-inset-left);--safe-right:env(safe-area-inset-right)}
[data-theme=dark]{--bg:#000;--surface:#1c1c1e;--s2:#2c2c2e;--text:#f5f5f7;--border:#38383a}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',sans-serif;min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-left:var(--safe-left);padding-right:var(--safe-right);overflow-x:hidden;-webkit-font-smoothing:antialiased}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.8)}
[data-theme=dark] header{background:rgba(28,28,30,0.8)}
.logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.cfg-btn{background:var(--s2);border:none;color:var(--text);padding:10px 16px;border-radius:22px;cursor:pointer;font-size:15px;font-weight:500;transition:transform 0.2s,background 0.2s;-webkit-user-select:none}
.cfg-btn:active{transform:scale(0.95);background:var(--border)}
.tabs{display:flex;gap:6px;padding:14px 20px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:60px;z-index:40}
.tab{flex:1;padding:12px 14px;border-radius:14px;border:none;background:var(--s2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s;-webkit-user-select:none}
.tab.active{background:var(--accent);color:#fff;transform:scale(1.02)}
.tab:active{transform:scale(0.97)}
.tab-content{display:none;padding:20px;max-width:500px;margin:0 auto;padding-bottom:calc(40px + var(--safe-bottom))}
.tab-content.active{display:block}
.today-card{background:linear-gradient(145deg,#5b6af0 0%,#7c3aed 50%,#af52de 100%);border-radius:24px;padding:24px;color:#fff;margin-bottom:20px;box-shadow:0 10px 40px rgba(91,106,240,0.3)}
.today-date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:14px;opacity:0.9}
.refresh-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all 0.2s}
.refresh-btn:active{transform:scale(0.95);background:rgba(255,255,255,0.3)}
.today-header{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.score-circle{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.score-inner{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:28px;font-weight:800;color:#1a1d2e;letter-spacing:-1px}
.score-sub{font-size:11px;color:#8e8e93;font-weight:500}
.today-greeting{font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:-0.3px}
.today-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-pill{background:rgba(255,255,255,0.2);border-radius:12px;padding:6px 12px;font-size:12px;font-weight:500;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.prediction{background:rgba(255,255,255,0.12);border-radius:16px;padding:16px;margin-bottom:20px;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.prediction-label{font-size:12px;opacity:0.8;margin-bottom:6px;font-weight:500}
.prediction-text{font-size:15px;line-height:1.5;font-weight:500}
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.comp{background:rgba(255,255,255,0.15);border-radius:14px;padding:12px 8px;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.comp-label{font-size:11px;opacity:0.8;margin-bottom:4px;font-weight:500}
.comp-val{font-size:18px;font-weight:700}
.comp-detail{font-size:10px;opacity:0.7;margin-top:2px}
.section-card{background:var(--surface);border-radius:20px;padding:20px;border:0.5px solid var(--border);margin-bottom:20px}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.month-nav button{background:var(--s2);border:none;border-radius:12px;width:40px;height:40px;cursor:pointer;font-size:18px;color:var(--text);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.month-nav button:active{transform:scale(0.92);background:var(--border)}
.month-label{flex:1;text-align:center;font-weight:600;font-size:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:8px 0;font-weight:600}
.cal-day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid transparent;transition:transform 0.15s}
.cal-day:active{transform:scale(0.92)}
.cal-day.today-mark{border-color:var(--accent);box-shadow:0 0 0 2px rgba(91,106,240,0.3)}
.cal-day.past{opacity:0.4}
.cal-score{font-size:10px;font-weight:700;margin-top:1px}
.s-top{background:#d1fae5;color:#065f46}
.s-high{background:#dcfce7;color:#15803d}
.s-mid{background:#e0e7ff;color:#4338ca}
.s-med{background:#fef3c7;color:#a16207}
.s-low{background:#fee2e2;color:#b91c1c}
[data-theme=dark] .s-top{background:#064e3b;color:#6ee7b7}
[data-theme=dark] .s-high{background:#065f46;color:#86efac}
[data-theme=dark] .s-mid{background:#312e81;color:#a5b4fc}
[data-theme=dark] .s-med{background:#78350f;color:#fcd34d}
[data-theme=dark] .s-low{background:#7f1d1d;color:#fca5a5}
.news-item{background:var(--surface);border-radius:18px;padding:18px;border:0.5px solid var(--border);margin-bottom:12px;transition:transform 0.2s}
.news-item:active{transform:scale(0.98)}
.news-tag{display:inline-block;color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;margin-bottom:10px}
.news-title{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.4;letter-spacing:-0.3px}
.news-desc{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.news-footer{display:flex;justify-content:space-between;align-items:center}
.news-time{font-size:13px;color:var(--muted)}
.news-link{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px;padding:8px 0}
.update-time{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.finance-card{background:var(--surface);border-radius:18px;padding:18px;border:0.5px solid var(--border);margin-bottom:12px;transition:transform 0.2s}
.finance-card:active{transform:scale(0.98)}
.finance-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.finance-pair{font-size:16px;font-weight:700}
.finance-row{display:flex;justify-content:space-between;align-items:flex-end}
.finance-price{font-size:26px;font-weight:800;letter-spacing:-1px}
.finance-change{font-size:13px;font-weight:600;padding:5px 10px;border-radius:8px}
.finance-change.up{background:rgba(52,199,89,0.15);color:var(--green)}
.finance-change.down{background:rgba(255,59,48,0.15);color:var(--red)}
.mini-chart{width:90px;height:36px}
.mini-chart svg{width:100%;height:100%}
.period-toggle{display:flex;gap:8px;margin-bottom:18px}
.period-btn{flex:1;padding:12px;border-radius:14px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.period-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.period-btn:active{transform:scale(0.96)}
.ai-verdict{background:linear-gradient(135deg,#5b6af0,#7c3aed);border-radius:18px;padding:18px;color:#fff;margin-top:18px;box-shadow:0 8px 30px rgba(91,106,240,0.25)}
.ai-verdict-title{font-size:15px;font-weight:700;margin-bottom:8px}
.ai-verdict-text{font-size:14px;line-height:1.6}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;padding-bottom:calc(24px + var(--safe-bottom));width:100%;max-width:500px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 20px}
.modal h2{font-size:18px;margin-bottom:20px;text-align:center;font-weight:700}
.form-section{margin-bottom:20px}
.form-section-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:14px;margin-bottom:6px;font-weight:500}
.fg input,.fg select{width:100%;background:var(--s2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-size:16px;box-sizing:border-box;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,106,240,0.2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-btn{background:var(--s2);border:2px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.2s}
.theme-btn.active{border-color:var(--accent);background:rgba(91,106,240,0.1)}
.theme-btn:active{transform:scale(0.96)}
.theme-icon{font-size:24px}
.theme-label{font-size:12px;font-weight:600;margin-top:6px}
.lang-grid{display:flex;gap:10px}
.lang-btn{flex:1;padding:14px;border-radius:16px;border:2px solid var(--border);background:var(--s2);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s}
.lang-btn.active{border-color:var(--accent);background:rgba(91,106,240,0.1)}
.lang-btn:active{transform:scale(0.97)}
.lang-btn .flag{width:36px;height:26px;border-radius:6px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.lang-btn .flag svg{width:100%;height:100%;display:block}
.lang-btn span{font-size:15px;font-weight:600}
.lang-btn.active span{color:var(--accent)}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-item{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:14px;padding:14px;cursor:pointer;transition:all 0.2s;border:0.5px solid var(--border)}
.check-item:active{transform:scale(0.97)}
.check-item input{width:22px;height:22px;accent-color:var(--accent)}
.check-label{font-size:14px;font-weight:500}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.btn{padding:16px;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--s2);color:var(--text)}
@supports(padding:max(0px)){body{padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right))}}
@media(max-width:390px){.comp-grid{grid-template-columns:repeat(2,1fr)}.today-header{gap:14px}.score-circle{width:80px;height:80px}.score-inner{width:64px;height:64px}.score-num{font-size:24px}}
@media(min-width:430px){.today-card{padding:28px}.score-circle{width:100px;height:100px}.score-inner{width:80px;height:80px}.score-num{font-size:32px}.today-greeting{font-size:20px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
<div class="logo">🔮 Day Forecast</div>
<button class="cfg-btn" id="cfgOpenBtn">⚙️</button>
</header>
<div class="tabs">
<button class="tab active" data-tab="forecast">⏰ <span data-t="forecast">Прогноз</span></button>
<button class="tab" data-tab="news">📰 <span data-t="news">AI News</span></button>
<button class="tab" data-tab="finance">📈 <span data-t="finance">Фінанси</span></button>
</div>
<div class="tab-content active" id="tab-forecast">
<div class="today-card">
<div class="today-date-row"><div id="todayDateLabel"></div><button class="refresh-btn" id="refreshBtn">🔄</button></div>
<div class="today-header">
<div class="score-circle" id="scoreCircle"><div class="score-inner"><div class="score-num" id="scoreNum">-</div><div class="score-sub">/ 10</div></div></div>
<div><div class="today-greeting" id="todayGreeting"></div><div class="today-meta" id="todayMeta"></div></div>
</div>
<div class="prediction"><div class="prediction-label">✨ <span data-t="prediction">Передбачення</span></div><div class="prediction-text" id="predictionText"></div></div>
<div class="comp-grid" id="components"></div>
</div>
<div class="section-card">
<div class="month-nav"><button id="prevMonth">←</button><div class="month-label" id="monthLabel"></div><button id="nextMonth">→</button></div>
<div class="cal-grid" id="calGrid"></div>
</div>
</div>
<div class="tab-content" id="tab-news"><div id="newsContainer"></div><div class="update-time" id="newsUpdateTime"></div></div>
<div class="tab-content" id="tab-finance">
<div class="period-toggle"><button class="period-btn active" data-period="week" data-t="week">Тиждень</button><button class="period-btn" data-period="month" data-t="month">Місяць</button><button class="period-btn" data-period="year" data-t="year">Рік</button></div>
<div id="financeContainer"></div>
<div class="update-time" id="financeUpdateTime"></div>
<div class="ai-verdict"><div class="ai-verdict-title">🤖 <span data-t="aiVerdict">AI Вердикт</span></div><div class="ai-verdict-text" id="verdictText"></div></div>
</div>
<div class="modal-overlay" id="configModal">
<div class="modal">
<div class="modal-handle"></div>
<h2>⚙️ <span data-t="settings">Налаштування</span></h2>
<div class="form-section">
<div class="fg"><label data-t="name">Ім'я</label><input type="text" id="cfgName" autocomplete="name" autocapitalize="words"></div>
<div class="form-row">
<div class="fg"><label data-t="birthDate">Дата народження</label><input type="date" id="cfgBirthDate"></div>
<div class="fg"><label data-t="birthTime">Час</label><input type="time" id="cfgBirthTime"></div>
</div>
<div class="fg"><label data-t="city">Місто</label><input type="text" id="cfgCity" autocomplete="address-level2"></div>
</div>
<div class="form-section">
<div class="form-section-title" data-t="theme">ТЕМА</div>
<div class="theme-grid">
<div class="theme-btn" data-theme-btn="light"><div class="theme-icon">☀️</div><div class="theme-label" data-t="light">Світла</div></div>
<div class="theme-btn" data-theme-btn="dark"><div class="theme-icon">🌙</div><div class="theme-label" data-t="dark">Темна</div></div>
<div class="theme-btn" data-theme-btn="auto"><div class="theme-icon">🔄</div><div class="theme-label" data-t="auto">Авто</div></div>
</div>
</div>
<div class="form-section">
<div class="form-section-title" data-t="lang">МОВА</div>
<div class="lang-grid">
<button class="lang-btn" data-lang-btn="uk" type="button"><div class="flag"><svg viewBox="0 0 32 22"><rect width="32" height="11" fill="#005BBB"/><rect y="11" width="32" height="11" fill="#FFD500"/></svg></div><span>Українська</span></button>
<button class="lang-btn" data-lang-btn="en" type="button"><div class="flag"><svg viewBox="0 0 60 30"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg></div><span>English</span></button>
</div>
</div>
<div class="form-section">
<div class="form-section-title" data-t="factors">ФАКТОРИ</div>
<div class="check-grid">
<label class="check-item"><input type="checkbox" id="cfgBio" checked><span class="check-label">🧬 <span data-t="bio">Біоритми</span></span></label>
<label class="check-item"><input type="checkbox" id="cfgMoon" checked><span class="check-label">🌙 <span data-t="moon">Місяць</span></span></label>
<label class="check-item"><input type="checkbox" id="cfgSeason" checked><span class="check-label">☀️ <span data-t="season">Сезон</span></span></label>
<label class="check-item"><input type="checkbox" id="cfgWeather" checked><span class="check-label">🌤️ <span data-t="weather">Погода</span></span></label>
<label class="check-item"><input type="checkbox" id="cfgWeekday" checked><span class="check-label">📅 <span data-t="weekday">День тижня</span></span></label>
<label class="check-item"><input type="checkbox" id="cfgRetro" checked><span class="check-label">🪐 <span data-t="retro">Ретроград</span></span></label>
</div>
</div>
<div class="form-section">
<div class="fg"><label data-t="newsCount">Кількість новин</label><select id="cfgNewsCount"><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option></select></div>
</div>
<div class="btn-row">
<button class="btn btn-secondary" id="cfgCancelBtn" data-t="cancel" type="button">Скасувати</button>
<button class="btn btn-primary" id="cfgSaveBtn" data-t="save" type="button">Зберегти</button>
</div>
</div>
</div>
<script>
var T={uk:{forecast:'Прогноз',news:'AI News',finance:'Фінанси',settings:'Налаштування',name:"Ім'я",birthDate:'Дата народження',birthTime:'Час',city:'Місто',theme:'ТЕМА',light:'Світла',dark:'Темна',auto:'Авто',lang:'МОВА',factors:'ФАКТОРИ',bio:'Біоритми',moon:'Місяць',season:'Сезон',weather:'Погода',weekday:'День тижня',retro:'Ретроград',newsCount:'Кількість новин',cancel:'Скасувати',save:'Зберегти',prediction:'Передбачення',week:'Тиждень',month:'Місяць',year:'Рік',aiVerdict:'AI Вердикт',updated:'Оновлено',ratesAsOf:'Курси станом на',read:'Читати',ago:'тому',noRetro:'Немає',active:'Активний',creative:'Творчий',calm:'Спокійний',topDay:'Топовий день',excellent:'Відмінний день',good:'Гарний день',average:'Середній день',rest:'День відпочинку',newMoon:'Новий',waxing:'Зростає',firstQ:'1-ша чв.',waxingG:'Зрост.',fullMoon:'Повний',waningG:'Спадає',lastQ:'Ост. чв.',waning:'Спадає',lightH:'Світло',dows:['Пн','Вт','Ср','Чт','Пт','Сб','Нд'],preds:["Хтось згадає тебе з посмішкою","Несподівана гарна новина в дорозі","Твоя ідея знайде підтримку","Вечір принесе сюрприз","Ти на правильному шляху","Маленька перемога чекає","Інтуїція сильна сьогодні","Креативна ідея прийде"],verdict:'Ринки під тиском через геополітичну напругу. S&P 500 втратив ~1%. Нафта зросла на 6.6%. Долар стабільний.'},en:{forecast:'Forecast',news:'AI News',finance:'Finance',settings:'Settings',name:'Name',birthDate:'Birth Date',birthTime:'Time',city:'City',theme:'THEME',light:'Light',dark:'Dark',auto:'Auto',lang:'LANGUAGE',factors:'FACTORS',bio:'Biorhythms',moon:'Moon',season:'Season',weather:'Weather',weekday:'Weekday',retro:'Retrograde',newsCount:'News count',cancel:'Cancel',save:'Save',prediction:'Prediction',week:'Week',month:'Month',year:'Year',aiVerdict:'AI Verdict',updated:'Updated',ratesAsOf:'Rates as of',read:'Read',ago:'ago',noRetro:'None',active:'Active',creative:'Creative',calm:'Calm',topDay:'Top day',excellent:'Excellent',good:'Good day',average:'Average',rest:'Rest day',newMoon:'New',waxing:'Waxing',firstQ:'1st Q',waxingG:'Wax.G',fullMoon:'Full',waningG:'Wan.G',lastQ:'Last Q',waning:'Waning',lightH:'Light',dows:['Mo','Tu','We','Th','Fr','Sa','Su'],preds:["Someone will think of you with a smile","Unexpected good news coming","Your idea will get support","Evening brings a surprise","You're on the right path","A small victory awaits","Your intuition is strong today","A creative idea will come"],verdict:'Markets under pressure due to tensions. S&P 500 lost ~1%. Oil surged 6.6%. Dollar stable.'}};
var newsData={uk:[{tag:'Anthropic',title:'Anthropic заблоковано урядом США',desc:'Трамп наказав припинити використання технологій Anthropic федеральними агенціями.',time:'2 год',url:'https://digit.fyi',c:'#7c3aed'},{tag:'OpenAI',title:'OpenAI підписала угоду з Пентагоном',desc:'Угода забороняє AI для масового спостереження та автономної зброї.',time:'10 год',url:'https://theregister.com',c:'#10b981'},{tag:'Anthropic',title:'Виявлено 24,000 фейкових акаунтів',desc:'Китайські лабораторії звинувачують у крадіжці технологій Claude.',time:'1 день',url:'https://mean.ceo',c:'#7c3aed'},{tag:'Apple',title:'Apple анонсувала нову Siri на Gemini',desc:'AI-асистент з контекстним розумінням вийде з iOS 26.4.',time:'2 дні',url:'https://crescendo.ai',c:'#6b7280'},{tag:'MCP',title:'MCP стає стандартом для AI-агентів',desc:'OpenAI та Microsoft приєдналися до протоколу від Anthropic.',time:'2 міс',url:'https://techcrunch.com',c:'#5b6af0'}],en:[{tag:'Anthropic',title:'Anthropic blocked by US government',desc:'Trump ordered federal agencies to stop using Anthropic technology.',time:'2h',url:'https://digit.fyi',c:'#7c3aed'},{tag:'OpenAI',title:'OpenAI signs Pentagon deal',desc:'Agreement prohibits AI for mass surveillance and autonomous weapons.',time:'10h',url:'https://theregister.com',c:'#10b981'},{tag:'Anthropic',title:'24,000 fake accounts discovered',desc:'Chinese labs accused of stealing Claude technology.',time:'1 day',url:'https://mean.ceo',c:'#7c3aed'},{tag:'Apple',title:'Apple announces new Siri on Gemini',desc:'AI assistant with contextual understanding coming with iOS 26.4.',time:'2 days',url:'https://crescendo.ai',c:'#6b7280'},{tag:'MCP',title:'MCP becomes standard for AI agents',desc:'OpenAI and Microsoft joined Anthropic protocol.',time:'2 mo',url:'https://techcrunch.com',c:'#5b6af0'}]};
var retrogrades=[{planet:{uk:'Меркурій',en:'Mercury'},start:'2026-02-26',end:'2026-03-20',impact:-0.5},{planet:{uk:'Юпітер',en:'Jupiter'},start:'2025-11-11',end:'2026-03-11',impact:-0.3}];
var cfg={name:'',birthDate:'1990-01-01',birthTime:'12:00',city:'Київ',lat:50.45,lon:30.52,theme:'auto',lang:'uk',useBio:true,useMoon:true,useSeason:true,useWeather:true,useWeekday:true,useRetro:true,newsCount:5};
var calMonth=new Date();calMonth.setDate(1);var weatherData=null;
function t(k){return T[cfg.lang][k]||k}
function hashCode(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h&=h}return Math.abs(h)}
function getMoonPhase(d){var k=new Date(2000,0,6);return(((d-k)/86400000%29.53)+29.53)%29.53/29.53}
function getMoonName(a){if(a<0.05)return'🌑 '+t('newMoon');if(a<0.25)return'🌒 '+t('waxing');if(a<0.35)return'🌓 '+t('firstQ');if(a<0.48)return'🌔 '+t('waxingG');if(a<0.55)return'🌕 '+t('fullMoon');if(a<0.73)return'🌖 '+t('waningG');if(a<0.83)return'🌗 '+t('lastQ');return'🌘 '+t('waning')}
function getDayLen(d,lat){var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);var decl=23.45*Math.sin((360/365)*(doy-81)*Math.PI/180);var cos0=-Math.tan(lat*Math.PI/180)*Math.tan(decl*Math.PI/180);if(cos0>=1)return 0;if(cos0<=-1)return 24;return(2/15)*Math.acos(cos0)*180/Math.PI}
function getRetroImpact(d){if(!cfg.useRetro)return{impact:0,active:[]};var ds=d.toISOString().split('T')[0];var tot=0,act=[];retrogrades.forEach(function(r){if(ds>=r.start&&ds<=r.end){tot+=r.impact;act.push(r.planet[cfg.lang])}});return{impact:Math.max(-1.5,tot),active:act}}
function getWeatherImpact(){if(!cfg.useWeather||!weatherData||!weatherData.current)return{impact:0,label:'—',temp:null};var c=weatherData.current;var adj=0;var pressure=c.surface_pressure||1013;if(pressure<1000)adj-=0.5;else if(pressure<1005)adj-=0.3;else if(pressure>1020)adj+=0.2;var code=c.weather_code||0;var label='☀️';if(code>=95){adj-=1;label='⛈️'}else if(code>=61){adj-=0.5;label='🌧️'}else if(code>=45){adj-=0.2;label='🌫️'}else if(code>=3){adj-=0.1;label='☁️'}else if(code>=1){adj+=0.2;label='⛅'}else{adj+=0.4}var temp=c.temperature_2m;if(temp>=18&&temp<=25)adj+=0.3;else if(temp<5||temp>32)adj-=0.3;return{impact:Math.round(Math.max(-1,Math.min(1,adj))*10)/10,label:label,temp:Math.round(temp)}}
function calcScore(date,incW){var bd=new Date(cfg.birthDate+'T'+cfg.birthTime);var days=(date-bd)/86400000;var p=Math.sin(2*Math.PI*days/23),e=Math.sin(2*Math.PI*days/28),ii=Math.sin(2*Math.PI*days/33);var bioRaw=(p*1.2+e*1.5+ii*1.3)/3;var bioScore=cfg.useBio?6+bioRaw*2.5:6;var moonPhase=getMoonPhase(date);var moonScore=cfg.useMoon?5+3*Math.abs(Math.cos(Math.PI*moonPhase*2-Math.PI/4)):6;var dayLen=getDayLen(date,cfg.lat);var seasonScore=cfg.useSeason?Math.min(10,Math.max(1,5+(dayLen-12)*0.5)):6;var w=date.getDay();var wdayAdj=cfg.useWeekday?(w===1?-0.5:(w===0||w>=5?0.5:0)):0;var retro=getRetroImpact(date);var weather=incW?getWeatherImpact():{impact:0,label:'—',temp:null};var raw=moonScore*0.15+bioScore*0.30+seasonScore*0.10+8*0.45+wdayAdj+retro.impact+weather.impact;return{score:Math.min(10,Math.max(1,Math.round(raw*10)/10)),moonScore:moonScore,bioScore:bioScore,seasonScore:seasonScore,moonPhase:moonPhase,dayLen:dayLen,physical:p,emotional:e,intellectual:ii,weather:weather,weekdayAdj:wdayAdj,retrograde:retro}}
function getBioLabel(p,e,i){if(p>e&&p>i)return'💪 '+t('active');if(i>e)return'🧠 '+t('creative');return'😌 '+t('calm')}
function greeting(s){if(s>=10)return'🔥 '+t('topDay');if(s>=8)return'✨ '+t('excellent');if(s>=6)return'👍 '+t('good');if(s>=4)return'😐 '+t('average');return'😴 '+t('rest')}
function applyTheme(th){var a=th;if(th==='auto')a=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',a==='dark'?'dark':'');document.querySelector('meta[name="theme-color"]').content=a==='dark'?'#000':'#5b6af0';document.querySelectorAll('.theme-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-theme-btn')===th)});document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang-btn')===cfg.lang)})}
function applyLang(){document.querySelectorAll('[data-t]').forEach(function(el){var k=el.getAttribute('data-t');if(T[cfg.lang][k])el.textContent=T[cfg.lang][k]});document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang-btn')===cfg.lang)})}
function updateDateLabel(){var n=new Date();var loc=cfg.lang==='uk'?'uk-UA':'en-US';document.getElementById('todayDateLabel').textContent=n.toLocaleDateString(loc,{weekday:'long',day:'numeric',month:'long'})}
function calcToday(){var now=new Date();var r=calcScore(now,true);var s=Math.round(r.score);var moonName=getMoonName(r.moonPhase);var color=s>=8?'#34c759':s>=6?'#5b6af0':'#ff9500';document.getElementById('scoreCircle').style.background='conic-gradient('+color+' '+(s*36)+'deg, rgba(255,255,255,0.2) 0)';document.getElementById('scoreNum').textContent=s;document.getElementById('todayGreeting').textContent=greeting(s)+(cfg.name?', '+cfg.name:'')+'!';var meta='';if(cfg.useMoon)meta+='<span class="meta-pill">'+moonName+'</span>';meta+='<span class="meta-pill">📍 '+cfg.city+'</span>';document.getElementById('todayMeta').innerHTML=meta;var preds=T[cfg.lang].preds;document.getElementById('predictionText').textContent=preds[hashCode(now.toDateString()+cfg.birthDate)%preds.length];var comps='';if(cfg.useMoon)comps+='<div class="comp"><div class="comp-label">🌙 '+t('moon')+'</div><div class="comp-val">'+r.moonScore.toFixed(1)+'</div><div class="comp-detail">'+moonName.split(' ')[1]+'</div></div>';if(cfg.useBio)comps+='<div class="comp"><div class="comp-label">🧬 '+t('bio')+'</div><div class="comp-val">'+r.bioScore.toFixed(1)+'</div><div class="comp-detail">'+getBioLabel(r.physical,r.emotional,r.intellectual).split(' ')[1]+'</div></div>';if(cfg.useSeason)comps+='<div class="comp"><div class="comp-label">☀️ '+t('lightH')+'</div><div class="comp-val">'+r.seasonScore.toFixed(1)+'</div><div class="comp-detail">'+Math.round(r.dayLen)+(cfg.lang==='uk'?'год':'h')+'</div></div>';if(cfg.useWeather)comps+='<div class="comp"><div class="comp-label">🌤️ '+t('weather')+'</div><div class="comp-val">'+(r.weather.impact>=0?'+':'')+r.weather.impact.toFixed(1)+'</div><div class="comp-detail">'+(r.weather.temp?r.weather.temp+'°C':'—')+'</div></div>';if(cfg.useWeekday)comps+='<div class="comp"><div class="comp-label">📅 '+t('weekday')+'</div><div class="comp-val">'+(r.weekdayAdj>=0?'+':'')+r.weekdayAdj.toFixed(1)+'</div><div class="comp-detail">'+T[cfg.lang].dows[(now.getDay()+6)%7]+'</div></div>';if(cfg.useRetro)comps+='<div class="comp"><div class="comp-label">🪐 '+t('retro')+'</div><div class="comp-val">'+(r.retrograde.impact>=0?'+':'')+r.retrograde.impact.toFixed(1)+'</div><div class="comp-detail">'+(r.retrograde.active.length?r.retrograde.active[0]:t('noRetro'))+'</div></div>';document.getElementById('components').innerHTML=comps}
function renderCal(){var y=calMonth.getFullYear(),m=calMonth.getMonth();var loc=cfg.lang==='uk'?'uk-UA':'en-US';document.getElementById('monthLabel').textContent=calMonth.toLocaleDateString(loc,{month:'long',year:'numeric'});var fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1;var days=new Date(y,m+1,0).getDate();var today=new Date();today.setHours(0,0,0,0);var html='';T[cfg.lang].dows.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>'});for(var j=0;j<off;j++)html+='<div class="cal-day"></div>';for(var d=1;d<=days;d++){var dt=new Date(y,m,d,12);var r=calcScore(dt,false);var sc=Math.round(r.score);var past=dt<today;var tod=dt.toDateString()===today.toDateString();var cls=sc>=10?'s-top':sc>=8?'s-high':sc>=6?'s-mid':sc>=4?'s-med':'s-low';html+='<div class="cal-day '+cls+(past?' past':'')+(tod?' today-mark':'')+'"><span>'+d+'</span><span class="cal-score">'+sc+'</span></div>'}document.getElementById('calGrid').innerHTML=html}
function loadWeather(){if(!cfg.useWeather)return Promise.resolve();return fetch('https://api.open-meteo.com/v1/forecast?latitude='+cfg.lat+'&longitude='+cfg.lon+'&current=temperature_2m,surface_pressure,weather_code&timezone=auto').then(function(r){return r.json()}).then(function(d){weatherData=d;calcToday()}).catch(function(){})}
function loadNews(){var news=newsData[cfg.lang].slice(0,cfg.newsCount);var html='';news.forEach(function(n){html+='<div class="news-item"><span class="news-tag" style="background:'+n.c+'">'+n.tag+'</span><div class="news-title">'+n.title+'</div><div class="news-desc">'+n.desc+'</div><div class="news-footer"><span class="news-time">'+n.time+' '+t('ago')+'</span><a href="'+n.url+'" target="_blank" rel="noopener" class="news-link">'+t('read')+' →</a></div></div>'});document.getElementById('newsContainer').innerHTML=html;document.getElementById('newsUpdateTime').textContent=t('updated')+': '+new Date().toLocaleTimeString(cfg.lang==='uk'?'uk-UA':'en-US')}
function genChart(up){var color=up?'#34c759':'#ff3b30';var pts=[];for(var i=0;i<12;i++){var yy=(up?30-i*1.5:10+i*1.5)+Math.random()*6-3;pts.push((i*9)+','+yy)}return'<svg viewBox="0 0 100 40"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round"/></svg>'}
function loadFinance(){var data={uah:43.14,uahCh:-0.08,btc:66100,btcCh:-0.69,sp:6824,spCh:-0.79};var items=[{pair:'💵 USD/UAH',price:data.uah.toFixed(2)+' ₴',ch:data.uahCh,up:data.uahCh>=0},{pair:'₿ BTC/USD',price:'$'+data.btc.toLocaleString(),ch:data.btcCh,up:data.btcCh>=0},{pair:'📈 S&P 500',price:data.sp.toLocaleString(),ch:data.spCh,up:data.spCh>=0}];var html='';items.forEach(function(it){html+='<div class="finance-card"><div class="finance-header"><div class="finance-pair">'+it.pair+'</div><div class="finance-change '+(it.up?'up':'down')+'">'+(it.up?'↑':'↓')+' '+Math.abs(it.ch).toFixed(2)+'%</div></div><div class="finance-row"><div class="finance-price">'+it.price+'</div><div class="mini-chart">'+genChart(it.up)+'</div></div></div>'});document.getElementById('financeContainer').innerHTML=html;document.getElementById('verdictText').textContent=T[cfg.lang].verdict;document.getElementById('financeUpdateTime').textContent=t('ratesAsOf')+' 2 '+(cfg.lang==='uk'?'березня':'March')+' 2026'}
function initTabs(){document.querySelectorAll('.tab').forEach(function(tab){tab.onclick=function(){var id=this.getAttribute('data-tab');document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});this.classList.add('active');document.getElementById('tab-'+id).classList.add('active');if(id==='news')loadNews();if(id==='finance')loadFinance()}});document.querySelectorAll('.period-btn').forEach(function(b){b.onclick=function(){document.querySelectorAll('.period-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');loadFinance()}})}
function openCfg(){document.getElementById('cfgName').value=cfg.name;document.getElementById('cfgBirthDate').value=cfg.birthDate;document.getElementById('cfgBirthTime').value=cfg.birthTime;document.getElementById('cfgCity').value=cfg.city;document.getElementById('cfgBio').checked=cfg.useBio;document.getElementById('cfgMoon').checked=cfg.useMoon;document.getElementById('cfgSeason').checked=cfg.useSeason;document.getElementById('cfgWeather').checked=cfg.useWeather;document.getElementById('cfgWeekday').checked=cfg.useWeekday;document.getElementById('cfgRetro').checked=cfg.useRetro;document.getElementById('cfgNewsCount').value=cfg.newsCount;applyTheme(cfg.theme);document.getElementById('configModal').classList.add('open')}
function closeCfg(){document.getElementById('configModal').classList.remove('open')}
function saveCfg(){cfg.name=document.getElementById('cfgName').value;cfg.birthDate=document.getElementById('cfgBirthDate').value;cfg.birthTime=document.getElementById('cfgBirthTime').value;cfg.city=document.getElementById('cfgCity').value;cfg.useBio=document.getElementById('cfgBio').checked;cfg.useMoon=document.getElementById('cfgMoon').checked;cfg.useSeason=document.getElementById('cfgSeason').checked;cfg.useWeather=document.getElementById('cfgWeather').checked;cfg.useWeekday=document.getElementById('cfgWeekday').checked;cfg.useRetro=document.getElementById('cfgRetro').checked;cfg.newsCount=parseInt(document.getElementById('cfgNewsCount').value);if(cfg.city){fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(cfg.city)+'&count=1&language='+cfg.lang).then(function(r){return r.json()}).then(function(d){if(d.results&&d.results.length){cfg.lat=d.results[0].latitude;cfg.lon=d.results[0].longitude;cfg.city=d.results[0].name}localStorage.setItem('forecast_v3',JSON.stringify(cfg));closeCfg();applyLang();updateDateLabel();loadWeather();calcToday();renderCal()}).catch(function(){localStorage.setItem('forecast_v3',JSON.stringify(cfg));closeCfg()})}else{localStorage.setItem('forecast_v3',JSON.stringify(cfg));closeCfg();applyLang();updateDateLabel();calcToday();renderCal()}}
function init(){var s=localStorage.getItem('forecast_v3');if(s)try{var p=JSON.parse(s);for(var k in p)cfg[k]=p[k]}catch(e){}applyTheme(cfg.theme);applyLang();updateDateLabel();calcToday();renderCal();loadWeather();initTabs();document.getElementById('refreshBtn').onclick=loadWeather;document.getElementById('cfgOpenBtn').onclick=openCfg;document.getElementById('cfgCancelBtn').onclick=closeCfg;document.getElementById('cfgSaveBtn').onclick=saveCfg;document.getElementById('configModal').onclick=function(e){if(e.target.id==='configModal')closeCfg()};document.getElementById('prevMonth').onclick=function(){calMonth.setMonth(calMonth.getMonth()-1);renderCal()};document.getElementById('nextMonth').onclick=function(){calMonth.setMonth(calMonth.getMonth()+1);renderCal()};document.querySelectorAll('.theme-btn').forEach(function(b){b.onclick=function(){cfg.theme=this.getAttribute('data-theme-btn');applyTheme(cfg.theme)}});document.querySelectorAll('.lang-btn').forEach(function(b){b.onclick=function(){cfg.lang=this.getAttribute('data-lang-btn');applyLang();updateDateLabel();calcToday();renderCal()}});window.matchMedia('(prefers-color-scheme:dark)').onchange=function(){if(cfg.theme==='auto')applyTheme('auto')}}
document.addEventListener('DOMContentLoaded',init);
</script>
